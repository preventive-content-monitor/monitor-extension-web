<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Bloqueado - Guardian</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --danger: #ef4444;
      --danger-light: #fecaca;
      --text: #1e293b;
      --text-secondary: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      max-width: 500px;
      width: 100%;
      text-align: center;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
      padding: 40px 30px;
      color: white;
    }

    .shield-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .content {
      padding: 30px;
    }

    .blocked-url {
      background: var(--danger-light);
      border: 2px solid var(--danger);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 24px;
      word-break: break-all;
      font-family: monospace;
      font-size: 0.9rem;
      color: var(--danger);
    }

    .info-box {
      background: #f1f5f9;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }

    .info-box h3 {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-box p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #e2e8f0;
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #cbd5e1;
    }

    .footer {
      padding: 16px 30px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .footer a {
      color: var(--primary);
      text-decoration: none;
    }

    .guardian-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      font-weight: 600;
      color: var(--text);
    }

    .timestamp {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="shield-icon">🛡️</div>
      <h1>Acesso Bloqueado</h1>
      <p>Este site foi bloqueado pelo seu responsável</p>
    </div>
    
    <div class="content">
      <div class="blocked-url" id="blockedUrl">
        Carregando...
      </div>
      
      <div class="info-box">
        <h3>🔒 Por que este site foi bloqueado?</h3>
        <p>
          Seu responsável configurou este site como não permitido para sua proteção.
          Se você acredita que isso é um erro, converse com ele.
        </p>
      </div>
      
      <div class="actions">
        <button class="btn btn-primary" onclick="goBack()">
          ← Voltar
        </button>
        <a href="https://google.com" class="btn btn-secondary">
          🏠 Ir para Google
        </a>
      </div>
      
      <div class="timestamp" id="timestamp"></div>
    </div>
    
    <div class="footer">
      <div>Protegido por</div>
      <div class="guardian-logo">
        <span>🛡️</span>
        <span>Guardian</span>
      </div>
    </div>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
